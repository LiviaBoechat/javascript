<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body{
            background-color: rgb(116, 134, 117);
            color: beige; /* Comentário em CSS é só com barra e asterísco */ 
            font: normal 20pt Cinzel;
        }
        h1 {
            color: rgb(187, 184, 184);
        }
        p{
            color: black;
            font: normal 20pt CINZEL;
        }
        h2 {
            color: blanchedalmond;
            font: normal 13pt Cinzel;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!-- Isso é um comentário-->
    <p>Já me livrei da maldição!</p>
  
    <script>
        var nome = window.prompt ('Qual é seu nome?') // Vai perguntar o nome na caixa
        window.alert ('É um prazer te conhecer,' + nome + '!') 
    </script>
</body>
</html>
